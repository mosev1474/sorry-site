<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> الموقع معمول عشان حسونه 😉 </title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Loading -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-heart">❤️</div>
        <p class="loading-text">استني يبت الموقع بيحمل ...</p>
    </div>

    <!-- خلفية القلوب -->
    <div class="hearts-background" id="heartsContainer"></div>

    <!-- الصفحة -->
    <div class="login-container" id="loginPage">
        <div class="login-box">

            <h1 class="main-title">مبدائيا كده اوحبك يحسونتي 🐥❤️</h1>
            <p class="subtitle">في يوم بحبو اوي <br>كان امتي ؟</p>

            <div class="input-group">
                <label>اليوم</label>
                <input type="number" id="day" min="1" max="31">
            </div>

            <div class="input-group">
                <label>الشهر</label>
                <input type="number" id="month" min="1" max="12">
            </div>

            <button class="login-btn" onclick="checkBirthday()">دوسي هنا لو متأكده </button>

            <div class="error-message" id="errorMessage"></div>

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
